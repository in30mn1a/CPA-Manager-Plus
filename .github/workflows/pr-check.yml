name: PR Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-template:
    name: PR Template
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail

          body="${PR_BODY:-}"
          required_headers=(
            "## Summary"
            "## Scope"
            "## Changes"
            "## User Impact"
            "## Compatibility / Runtime Notes"
            "## Data / Security Notes"
            "## Risk / Rollback"
            "## Verification"
            "## Screenshots / Recordings"
            "## Docs"
            "## Related"
          )

          missing_headers=()
          for header in "${required_headers[@]}"; do
            if ! grep -Fq "$header" <<< "$body"; then
              missing_headers+=("$header")
            fi
          done

          if (( ${#missing_headers[@]} > 0 )); then
            echo "PR body is missing required template sections:"
            printf ' - %s\n' "${missing_headers[@]}"
            exit 1
          fi

          if ! grep -Eq '^- \[[xX]\] (Frontend panel|Manager Server|CPA panel mode|Full Docker mode|Native packages / release|Docs / Wiki|CI / build / tooling)$' <<< "$body"; then
            echo "PR body must check at least one item in the Scope section."
            exit 1
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VERSION: ci

  manager-server:
    name: Manager Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: apps/manager-server/go.sum

      - name: Test
        working-directory: apps/manager-server
        run: go test ./...

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - manager-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Manager Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.manager-server
          push: false
          build-args: |
            VERSION=ci
